name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Test
        run: go test . -race -timeout 5m

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Check goimports formatting
        run: |
          go install golang.org/x/tools/cmd/goimports@latest
          goimports -l -local github.com/AddnessTech . | tee /tmp/goimports.out
          if [ -s /tmp/goimports.out ]; then
            echo "goimports formatting issues found. Run: goimports -w -local github.com/AddnessTech ."
            exit 1
          fi

      - name: Lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.4.0
